name: Python Quality

on:

  push:

  pull_request:

jobs:

  quality:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - run: pip install black ruff isort mypy

    - run: black --check .

    - run: isort --check .

    - run: ruff check .

    - run: mypy .
