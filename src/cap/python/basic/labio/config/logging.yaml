version: 1

disable_existing_loggers: false


formatters:

  detallado:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"


  simple:
    format: "%(asctime)s | %(levelname)s | %(message)s"



handlers:

  consola:
    class: logging.StreamHandler
    level: INFO
    formatter: simple


  archivo:
    class: logging.FileHandler
    level: DEBUG
    formatter: detallado
    encoding: utf-8



loggers:

  main:
    level: DEBUG
    handlers:
      - consola
      - archivo
    propagate: false


  procesador:
    level: DEBUG
    handlers:
      - consola
      - archivo
    propagate: false


  reportes:
    level: DEBUG
    handlers:
      - consola
      - archivo
    propagate: false



root:
  level: WARNING
  handlers:
    - archivo
